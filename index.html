<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIMS Review Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0b0d12; --bg-elev: #12151c; --panel: #171b24; --panel-2: #1d2230; --border: #262c3a; --border-soft: #1e222d;
    --text: #eef0f4; --muted: #8b93a7; --muted-2: #5f6779;
    --accent: #6d8bff; --accent-soft: rgba(109,139,255,0.14); --accent-strong: #4f6ee0;
    --green: #35c98f; --green-soft: rgba(53,201,143,0.14);
    --amber: #f4b955; --amber-soft: rgba(244,185,85,0.14);
    --red: #f16d75; --red-soft: rgba(241,109,117,0.14);
    --gray: #6c7688; --gray-soft: rgba(108,118,136,0.14);
    --radius: 10px; --radius-sm: 7px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.25);
    --shadow-md: 0 10px 30px rgba(0,0,0,0.35);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin:0; font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: radial-gradient(1200px 600px at 100% -10%, rgba(109,139,255,0.07), transparent),
                radial-gradient(900px 500px at -10% 110%, rgba(154,123,255,0.05), transparent),
                var(--bg);
    color: var(--text); -webkit-font-smoothing: antialiased;
  }

  @keyframes fadeInUp { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes popIn { from { opacity:0; transform: scale(.94); } to { opacity:1; transform: scale(1); } }

  /* ---------- Header ---------- */
  header {
    padding: 14px 26px; border-bottom: 1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; gap: 20px;
    background: rgba(18,21,28,0.85); backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 10;
  }
  .brand { display:flex; align-items:center; gap: 10px; }
  .brand .mark {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #9a7bff);
    display:flex; align-items:center; justify-content:center;
    font-size: 14px; font-weight: 800; color: #0b0d12; letter-spacing: -0.5px;
    box-shadow: 0 2px 10px rgba(109,139,255,0.35);
  }
  header h1 { font-size: 16px; margin:0; font-weight: 700; letter-spacing: -0.01em; }
  header .subtitle { font-size: 11px; color: var(--muted-2); margin-top: 1px; }
  .header-right { display:flex; align-items:center; gap: 14px; }
  .tabs { display:flex; gap:4px; background: var(--panel); border: 1px solid var(--border); border-radius: 999px; padding: 3px; }
  .tab-btn {
    background:transparent; border:none; color: var(--muted); padding: 7px 16px; border-radius: 999px;
    cursor:pointer; font-size:13px; font-weight: 600; font-family: inherit; transition: all .15s ease;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { background: var(--accent); color: #fff; box-shadow: var(--shadow-sm); }
  .icon-btn {
    background: var(--panel); border: 1px solid var(--border); color: var(--muted); width: 34px; height: 34px;
    border-radius: 8px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition: all .15s ease;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--accent); background: var(--accent-soft); transform: rotate(-20deg); }
  .icon-btn svg { width: 16px; height: 16px; }

  /* ---------- Layout ---------- */
  #layout { display: flex; height: calc(100vh - 61px); }
  #inbox { width: 360px; border-right: 1px solid var(--border); overflow-y: auto; background: var(--bg-elev); display:flex; flex-direction:column; }
  .inbox-toolbar { padding: 14px 16px 10px; position: sticky; top:0; background: var(--bg-elev); z-index:2; display:flex; flex-direction:column; gap:8px; }
  .search-box { position: relative; }
  .search-box svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); width:14px; height:14px; color: var(--muted-2); pointer-events:none; }
  .search-box input {
    width:100%; background: var(--panel); border:1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 12px 8px 38px; font-size: 13px; font-family: inherit; outline:none; transition: border-color .15s ease, box-shadow .15s ease;
  }
  .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .filter-row { display:flex; gap:8px; align-items:center; }
  .filter-row select {
    flex: 1; background: var(--panel); border:1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 7px 10px; font-size: 12.5px; font-family: inherit; outline:none; cursor:pointer; transition: border-color .15s ease;
  }
  .filter-row select:focus { border-color: var(--accent); }
  .inbox-count { color: var(--muted-2); font-size: 11px; padding: 8px 16px 2px; text-transform: uppercase; letter-spacing: .05em; font-weight: 600; display:flex; align-items:center; justify-content:space-between; }
  .stat-pills { display:flex; gap:6px; padding: 6px 16px 8px; flex-wrap: wrap; }
  .stat-pill {
    font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: var(--panel);
    border: 1px solid var(--border); color: var(--muted); display:flex; align-items:center; gap:5px;
  }
  .stat-pill .dot { width:6px; height:6px; border-radius:50%; }
  .inbox-list { flex: 1; overflow-y: auto; padding: 4px 10px 16px; }

  .inbox-item {
    padding: 13px 14px; border-radius: var(--radius-sm); cursor: pointer; margin-bottom: 6px;
    border: 1px solid transparent; transition: all .15s ease;
    animation: fadeInUp .25s ease both;
  }
  .inbox-item:hover { background: var(--panel); border-color: var(--border); transform: translateX(2px); }
  .inbox-item.active { background: var(--panel-2); border-color: var(--accent); box-shadow: var(--shadow-sm); }
  .inbox-item .title { font-size: 13.5px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; color: var(--text); }
  .inbox-item .meta-row { display:flex; align-items:center; gap: 6px; flex-wrap: wrap; }

  .badge {
    display:inline-flex; align-items:center; gap:4px; font-size: 10.5px; font-weight: 700; letter-spacing: .02em;
    padding: 3px 9px; border-radius: 999px; text-transform: uppercase;
  }
  .badge.NEWS { background: var(--red-soft); color: var(--red); }
  .badge.CONTENT_IDEA { background: var(--accent-soft); color: var(--accent); }
  .badge.score { background: var(--green-soft); color: var(--green); }
  .badge.plain { background: var(--gray-soft); color: var(--gray); }

  #detail { flex: 1; overflow-y: auto; padding: 32px 44px 60px; max-width: 880px; animation: fadeIn .25s ease; }
  .detail-head { display:flex; align-items:flex-start; justify-content:space-between; gap: 20px; }
  #detail h2 { margin: 0 0 10px; font-size: 22px; font-weight: 800; letter-spacing: -0.01em; line-height:1.3; }
  .score-ring {
    flex-shrink:0; width: 56px; height: 56px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size: 15px; font-weight: 800; position: relative;
  }
  .score-ring .ring-value { position:relative; z-index:1; }
  .status-line { color: var(--muted); font-size: 12.5px; margin: 10px 0 4px; }
  .warn-note {
    color: var(--amber); background: var(--amber-soft); border: 1px solid rgba(244,185,85,0.3);
    padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-top: 14px; display:flex; gap:8px; align-items:flex-start;
  }

  .slide-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px;
    margin-bottom: 10px; transition: border-color .15s ease, transform .15s ease;
  }
  .slide-card:hover { border-color: var(--accent); transform: translateX(2px); }
  .slide-card .num {
    color: var(--accent); font-size: 11px; margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
  }
  .slide-card .body { font-size: 14px; line-height: 1.55; }

  .scores { display:grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 14px 0; }
  .score-row {
    background: var(--panel); border:1px solid var(--border); padding: 10px 14px; border-radius: var(--radius-sm); font-size: 12.5px;
    transition: border-color .15s ease;
  }
  .score-row:hover { border-color: var(--border-soft); }
  .score-row .score-head { display:flex; justify-content:space-between; margin-bottom: 6px; text-transform: capitalize; color: var(--muted); }
  .score-row .score-head strong { color: var(--text); font-size: 13px; }
  .score-bar-track { height: 5px; border-radius: 999px; background: var(--border); overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), #9a7bff); transition: width .4s ease; }

  .section-label {
    color: var(--muted-2); font-size: 11px; text-transform: uppercase; letter-spacing: .07em; font-weight: 700;
    margin: 28px 0 10px; display:flex; align-items:center; gap: 8px;
  }
  .section-label::after { content:''; flex:1; height:1px; background: var(--border-soft); }

  textarea, input[type=text] {
    width: 100%; background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm);
    padding: 10px 12px; font-family: inherit; font-size: 13.5px; outline: none; transition: border-color .15s ease;
  }
  textarea:focus, input[type=text]:focus { border-color: var(--accent); }

  .actions { display:flex; gap: 10px; margin-top: 26px; flex-wrap: wrap; }
  .actions button {
    padding: 9px 18px; border-radius: var(--radius-sm); border: 1px solid transparent; cursor: pointer;
    font-size: 13px; font-weight: 700; font-family: inherit; transition: transform .1s ease, filter .15s ease, box-shadow .15s ease;
    display:flex; align-items:center; gap: 6px;
  }
  .actions button svg { width:14px; height:14px; }
  .actions button:hover { filter: brightness(1.1); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .actions button:active { transform: scale(0.96); }
  .btn-approve { background: var(--green); color: #04241a; }
  .btn-revise { background: var(--amber); color: #3a2600; }
  .btn-reject { background: var(--red); color: #3a0a0a; }
  .btn-archive { background: var(--panel-2); color: var(--text); border-color: var(--border); }
  .btn-download { background: var(--accent); color: #fff; }

  #empty, #config-warning {
    padding: 60px 30px; color: var(--muted); text-align:center; font-size: 13.5px;
  }
  #empty { display:flex; flex-direction:column; align-items:center; gap: 10px; animation: fadeIn .3s ease; }
  #empty svg { width: 40px; height: 40px; color: var(--muted-2); opacity: .6; }
  #config-warning { color: var(--amber); text-align:left; background: var(--amber-soft); margin: 12px; border-radius: var(--radius-sm); border: 1px solid rgba(244,185,85,0.3); }

  .caption-box {
    white-space: pre-wrap; background: var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px 18px; font-size: 13.5px; line-height: 1.6; color: var(--text);
  }
  .revise-note { display:none; margin-top: 12px; }
  a.source-link { color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 600; display:inline-flex; align-items:center; gap:5px; }
  a.source-link:hover { text-decoration: underline; }

  .outline-item { display:flex; gap:12px; padding:8px 0; border-bottom:1px solid var(--border-soft); font-size:13px; align-items:baseline; }
  .outline-item:last-child { border-bottom: none; }
  .outline-item .num {
    color: var(--muted); min-width: 22px; font-weight: 700; font-size: 11.5px;
    background: var(--panel-2); border-radius: 5px; padding: 2px 6px; text-align:center;
  }

  .learning-card {
    background: var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; margin-bottom:14px;
    transition: border-color .15s ease; animation: fadeInUp .25s ease both;
  }
  .learning-card:hover { border-color: var(--accent); }
  .learning-card h3 { margin:14px 0 8px; font-size:13px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .learning-card h3:first-of-type { margin-top: 4px; }
  .learning-card .period {
    color: var(--text); font-size:13px; margin-bottom:4px; font-weight: 700; display:flex; align-items:center; gap:8px;
  }
  .perf-list { font-size:13px; margin: 4px 0; padding-left: 20px; color: var(--text); line-height: 1.7; }

  .loading-row { padding:20px; color:var(--muted); font-size: 13px; display:flex; align-items:center; gap:10px; }
  .spinner {
    width:14px; height:14px; border-radius:50%; border: 2px solid var(--border); border-top-color: var(--accent);
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- Toasts ---------- */
  #toast-container { position: fixed; bottom: 22px; right: 22px; display:flex; flex-direction:column; gap: 10px; z-index: 100; }
  .toast {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: var(--radius-sm);
    font-size: 13px; box-shadow: var(--shadow-md); opacity:0; transform: translateY(8px) scale(.97); transition: all .25s ease;
    display:flex; align-items:center; gap:10px; max-width: 320px;
  }
  .toast.show { opacity:1; transform: translateY(0) scale(1); }
  .toast .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .toast-success .dot { background: var(--green); }
  .toast-error .dot { background: var(--red); }
  .toast-info .dot { background: var(--accent); }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="mark">A</div>
    <div>
      <h1>AIMS Review Hub</h1>
      <div class="subtitle">S7 &middot; Content Review &amp; Approval</div>
    </div>
  </div>
  <div class="header-right">
    <div class="tabs">
      <button class="tab-btn active" id="tab-inbox" onclick="switchTab('inbox')">Inbox</button>
      <button class="tab-btn" id="tab-insights" onclick="switchTab('insights')">Insights</button>
    </div>
    <button class="icon-btn" title="Reload" onclick="switchTab(currentTab)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"></path></svg>
    </button>
  </div>
</header>

<div id="layout">
  <div id="inbox">
    <div id="config-warning" style="display:none;">Isi SUPABASE_URL &amp; SUPABASE_ANON_KEY di bagian &lt;script&gt; sebelum host file ini.</div>
    <div class="inbox-toolbar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="search-input" placeholder="Cari judul konten..." oninput="renderInboxList()">
      </div>
      <div class="filter-row">
        <select id="category-filter" onchange="renderInboxList()">
          <option value="">Semua kategori</option>
          <option value="NEWS">NEWS</option>
          <option value="CONTENT_IDEA">CONTENT_IDEA</option>
        </select>
        <select id="sort-order" onchange="renderInboxList()">
          <option value="score_desc">Skor: tertinggi</option>
          <option value="score_asc">Skor: terendah</option>
          <option value="newest">Terbaru</option>
        </select>
      </div>
    </div>
    <div class="inbox-count" id="inbox-count"></div>
    <div class="stat-pills" id="stat-pills"></div>
    <div class="inbox-list" id="inbox-list"></div>
  </div>
  <div id="detail">
    <div id="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
      Pilih konten di sebelah kiri untuk mulai review.
    </div>
  </div>
</div>
<div id="insights-view" style="display:none; padding: 28px 36px; overflow-y:auto; height: calc(100vh - 61px);"></div>
<div id="toast-container"></div>

<script>
// ====== KONFIGURASI — ISI SEBELUM DEPLOY ======
const SUPABASE_URL = 'https://vjpodskxeogtthexksfy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqcG9kc2t4ZW9ndHRoZXhrc2Z5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MDQzMDAsImV4cCI6MjA5ODM4MDMwMH0.DsWmzFFL4FzuwPS8Ya9_YgnDHQBcqcubqMSGW60Q2SE';
// ================================================

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let items = [];
let activeId = null;
let currentTab = 'inbox';

function showToast(msg, type) {
  type = type || 'info';
  const container = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.innerHTML = '<span class="dot"></span><span>' + esc(msg) + '</span>';
  container.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 250);
  }, 3200);
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-inbox').classList.toggle('active', tab === 'inbox');
  document.getElementById('tab-insights').classList.toggle('active', tab === 'insights');
  document.getElementById('layout').style.display = tab === 'inbox' ? 'flex' : 'none';
  document.getElementById('insights-view').style.display = tab === 'insights' ? 'block' : 'none';
  if (tab === 'inbox') loadInbox(); else loadInsights();
}

async function loadInsights() {
  const el = document.getElementById('insights-view');
  el.innerHTML = '<div class="loading-row"><span class="spinner"></span> Memuat...</div>';
  const { data, error } = await sb.schema('s11').from('learning_notes').select('*').order('created_at', { ascending: false }).limit(20);
  if (error) { el.innerHTML = '<div style="color:var(--red);">Gagal memuat: ' + esc(error.message) + '</div>'; return; }
  if (!data || data.length === 0) { el.innerHTML = '<div style="color:var(--muted);">Belum ada learning_notes. S11 System Learning jalan mingguan (Senin 08:00) — cek lagi setelah run pertama.</div>'; return; }

  el.innerHTML = data.map((n, i) => {
    const top = (n.top_performers || []).map(p => '<li>' + esc(p.title || p.content_item_id) + ' — ' + esc(p.hipotesis || '') + '</li>').join('');
    const low = (n.low_performers || []).map(p => '<li>' + esc(p.title || p.content_item_id) + ' — ' + esc(p.hipotesis || '') + '</li>').join('');
    return '<div class="learning-card" style="animation-delay:' + (i * 0.04) + 's;">' +
      '<div class="period">' + esc(n.period_start) + ' &ndash; ' + esc(n.period_end) + (n.applied ? ' <span class="badge score">sudah diterapkan</span>' : '') + '</div>' +
      '<h3>Top performer</h3><ul class="perf-list">' + (top || '<li>-</li>') + '</ul>' +
      '<h3>Perlu perhatian</h3><ul class="perf-list">' + (low || '<li>-</li>') + '</ul>' +
      '<h3>Saran</h3><div class="caption-box">' + esc(n.suggestions) + '</div>' +
      '</div>';
  }).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.innerText = s == null ? '' : String(s);
  return d.innerHTML;
}

function scoreColor(val) {
  if (val == null) return 'var(--gray)';
  const n = Number(val);
  if (n >= 8) return 'var(--green)';
  if (n >= 5) return 'var(--amber)';
  return 'var(--red)';
}

async function loadInbox() {
  const listEl = document.getElementById('inbox-list');
  const countEl = document.getElementById('inbox-count');
  if (!SUPABASE_ANON_KEY || SUPABASE_ANON_KEY === 'ISI_ANON_KEY_DI_SINI') {
    document.getElementById('config-warning').style.display = 'block';
  }
  countEl.textContent = '';
  document.getElementById('stat-pills').innerHTML = '';
  listEl.innerHTML = '<div class="loading-row"><span class="spinner"></span> Memuat...</div>';

  // Tabel sekarang tersebar di 1 schema per tahap (s2=topic_labels, s3=topic_scores,
  // s4=content_items, s5=carousel_drafts, s6=visual_briefs, s1=raw_sources) — PostgREST
  // nested-embed cross-schema tidak diandalkan, jadi query terpisah lalu digabung manual di JS.
  const { data: ciData, error } = await sb
    .schema('s4')
    .from('content_items')
    .select('*')
    .eq('status', 'ready_for_review')
    .order('created_at', { ascending: false });

  if (error) {
    listEl.innerHTML = '<div style="padding:20px;color:var(--red);">Gagal memuat: ' + esc(error.message) + '</div>';
    return;
  }

  const contentItemIds = (ciData || []).map(i => i.id);
  const rawSourceIds = [...new Set((ciData || []).map(i => i.raw_source_id).filter(Boolean))];

  const [{ data: drafts, error: draftErr }, { data: raws, error: rawErr }, { data: briefs, error: briefErr }] = await Promise.all([
    contentItemIds.length
      ? sb.schema('s5').from('carousel_drafts').select('*').in('content_item_id', contentItemIds)
      : Promise.resolve({ data: [] }),
    rawSourceIds.length
      ? sb.schema('s1').from('raw_sources').select('id, url, published_at').in('id', rawSourceIds)
      : Promise.resolve({ data: [] }),
    contentItemIds.length
      ? sb.schema('s6').from('visual_briefs').select('*').in('content_item_id', contentItemIds)
      : Promise.resolve({ data: [] })
  ]);
  const [{ data: scores, error: scoreErr }, { data: labels, error: labelErr }] = await Promise.all([
    rawSourceIds.length
      ? sb.schema('s3').from('topic_scores').select('*').in('raw_source_id', rawSourceIds)
      : Promise.resolve({ data: [] }),
    rawSourceIds.length
      ? sb.schema('s2').from('topic_labels').select('*').in('raw_source_id', rawSourceIds)
      : Promise.resolve({ data: [] })
  ]);

  if (draftErr || rawErr || scoreErr || labelErr || briefErr) {
    listEl.innerHTML = '<div style="padding:20px;color:var(--red);">Gagal memuat data pendukung: ' + esc((draftErr || rawErr || scoreErr || labelErr || briefErr).message) + '</div>';
    return;
  }

  const draftByItem = Object.fromEntries((drafts || []).map(d => [d.content_item_id, d]));
  const rawById = Object.fromEntries((raws || []).map(r => [r.id, r]));
  const scoreByRaw = Object.fromEntries((scores || []).map(s => [s.raw_source_id, s]));
  const labelByRaw = Object.fromEntries((labels || []).map(l => [l.raw_source_id, l]));
  const briefByItem = Object.fromEntries((briefs || []).map(b => [b.content_item_id, b]));

  items = (ciData || []).map(it => {
    const draft = draftByItem[it.id];
    const visualBrief = briefByItem[it.id];
    return {
      ...it,
      carousel_drafts: draft ? [{ ...draft, visual_brief: visualBrief ? visualBrief.visual_brief : null }] : [],
      raw_sources: rawById[it.raw_source_id]
        ? {
            ...rawById[it.raw_source_id],
            topic_scores: scoreByRaw[it.raw_source_id]
              ? { ...scoreByRaw[it.raw_source_id], category: labelByRaw[it.raw_source_id] ? labelByRaw[it.raw_source_id].category : null }
              : null
          }
        : null
    };
  });

  renderInboxList();
}

function getCategory(it) {
  const ts = it.raw_sources && it.raw_sources.topic_scores;
  return ts ? ts.category : null;
}

function getScore(it) {
  const ts = it.raw_sources && it.raw_sources.topic_scores;
  const val = ts ? ts.total_score : null;
  return val == null ? -Infinity : Number(val);
}

function renderStatPills() {
  const pillsEl = document.getElementById('stat-pills');
  if (items.length === 0) { pillsEl.innerHTML = ''; return; }
  const counts = {};
  items.forEach(it => {
    const c = getCategory(it) || 'Lainnya';
    counts[c] = (counts[c] || 0) + 1;
  });
  const colorMap = { NEWS: 'var(--red)', CONTENT_IDEA: 'var(--accent)', Lainnya: 'var(--gray)' };
  pillsEl.innerHTML = Object.entries(counts).map(([cat, n]) =>
    '<span class="stat-pill"><span class="dot" style="background:' + (colorMap[cat] || 'var(--gray)') + ';"></span>' + esc(cat) + ' &middot; ' + n + '</span>'
  ).join('');
}

function renderInboxList() {
  const listEl = document.getElementById('inbox-list');
  const countEl = document.getElementById('inbox-count');
  const q = (document.getElementById('search-input').value || '').toLowerCase().trim();
  const categoryFilter = document.getElementById('category-filter').value;
  const sortOrder = document.getElementById('sort-order').value;

  let filtered = q ? items.filter(it => (it.title || '').toLowerCase().includes(q)) : items.slice();
  if (categoryFilter) filtered = filtered.filter(it => getCategory(it) === categoryFilter);

  if (sortOrder === 'score_desc') filtered.sort((a, b) => getScore(b) - getScore(a));
  else if (sortOrder === 'score_asc') filtered.sort((a, b) => getScore(a) - getScore(b));
  // 'newest' keeps the created_at desc order already returned by the query

  renderStatPills();

  if (items.length === 0) {
    countEl.textContent = '';
    listEl.innerHTML = '<div class="loading-row" style="color:var(--muted);"><span>Tidak ada konten ready_for_review.</span></div>';
    return;
  }

  countEl.innerHTML = '<span>' + filtered.length + ' konten menunggu review</span>';

  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="loading-row" style="color:var(--muted);"><span>Tidak ada hasil untuk filter/pencarian ini.</span></div>';
    return;
  }

  listEl.innerHTML = filtered.map((it, i) => {
    const category = getCategory(it);
    const score = it.raw_sources && it.raw_sources.topic_scores ? it.raw_sources.topic_scores.total_score : '-';
    return '<div class="inbox-item' + (it.id === activeId ? ' active' : '') + '" style="animation-delay:' + (i * 0.03) + 's;" onclick="showDetail(\'' + it.id + '\')">' +
      '<div class="title">' + esc(it.title || '(tanpa judul)') + '</div>' +
      '<div class="meta-row">' +
      '<span class="badge ' + esc(category || 'plain') + '">' + esc(category || 'tanpa kategori') + '</span>' +
      '<span class="badge score">skor ' + esc(score) + '</span>' +
      '</div>' +
      '</div>';
  }).join('');
}

function showDetail(id) {
  activeId = id;
  renderInboxList(); // refresh highlight state cheaply
  const it = items.find(x => x.id === id);
  const detailEl = document.getElementById('detail');
  if (!it) { detailEl.innerHTML = '<div id="empty">Konten tidak ditemukan.</div>'; return; }

  const draft = it.carousel_drafts && it.carousel_drafts[0] ? it.carousel_drafts[0] : {};
  const ts = it.raw_sources && it.raw_sources.topic_scores ? it.raw_sources.topic_scores : {};
  const slides = draft.slides || [];
  const hooks = draft.hooks || [];
  const ringColor = scoreColor(ts.total_score);

  const dims = ['relevance','timeliness','audience_fit','originality','visual_potential','brand_safety','engagement_potential'];
  const scoreRows = dims.map(d => {
    const val = ts['score_' + d];
    const pct = val == null ? 0 : Math.max(0, Math.min(100, Number(val) * 10));
    return '<div class="score-row">' +
      '<div class="score-head"><span>' + d.replace(/_/g, ' ') + '</span><strong>' + (val == null ? '-' : val) + '</strong></div>' +
      '<div class="score-bar-track"><div class="score-bar-fill" style="width:' + pct + '%;"></div></div>' +
      '</div>';
  }).join('');

  detailEl.innerHTML =
    '<div class="detail-head">' +
      '<div style="flex:1;">' +
        '<h2>' + esc(it.title) + '</h2>' +
        '<div><span class="badge ' + esc(ts.category || 'plain') + '">' + esc(ts.category || '-') + '</span></div>' +
      '</div>' +
      '<div class="score-ring" style="background: conic-gradient(' + ringColor + ' ' + (Math.max(0, Math.min(100, (ts.total_score || 0) * 10))) + '%, var(--border) 0); ">' +
        '<div style="width:44px;height:44px;border-radius:50%;background:var(--bg-elev);display:flex;align-items:center;justify-content:center;">' +
          '<span class="ring-value" style="color:' + ringColor + ';">' + esc(ts.total_score != null ? ts.total_score : '-') + '</span>' +
        '</div>' +
      '</div>' +
    '</div>' +
    (draft.needs_revision_note ? '<div class="warn-note">⚠ ' + esc(draft.needs_revision_note) + '</div>' : '') +
    '<p class="status-line">Status: ' + esc(it.status) + '</p>' +

    '<div class="section-label">Rencana Konten (S4 Planning)</div>' +
    '<p style="color:var(--muted);margin-bottom:10px;font-size:13.5px;"><em>Angle:</em> ' + esc(it.angle || '-') + '</p>' +
    (it.outline || []).map(o => '<div class="outline-item"><span class="num">' + esc(o.slide_number) + '</span><span>' + esc(o.purpose) + '</span></div>').join('') +

    '<div class="section-label">Hooks</div>' +
    '<div class="caption-box">' + hooks.map(esc).join('<br>') + '</div>' +

    '<div class="section-label">Slides</div>' +
    slides.map(s => {
      const vb = (draft.visual_brief || []).find(b => b.slide_number === s.slide_number);
      const vbLine = vb ? '<div style="color:var(--muted);font-size:12px;margin-top:8px;">layout: ' + esc(vb.layout) + ' &middot; image: ' + esc(vb.image_cue) + ' &middot; <span style="color:' + esc(vb.accent_color) + '">' + esc(vb.accent_color) + '</span></div>' : '';
      return '<div class="slide-card"><div class="num">Slide ' + esc(s.slide_number) + '</div><div class="body">' + esc(s.text) + '</div>' + vbLine + '</div>';
    }).join('') +

    '<div class="section-label">Caption &amp; CTA</div>' +
    '<div class="caption-box">' + esc(draft.caption) + '\n\n' + esc(draft.cta) + '</div>' +

    '<div class="section-label">Source Note</div>' +
    '<div class="caption-box">' + esc(draft.source_note) + '</div>' +
    (it.raw_sources && it.raw_sources.url ? '<p style="margin-top:10px;"><a class="source-link" href="' + esc(it.raw_sources.url) + '" target="_blank">Sumber asli →</a></p>' : '') +

    '<div class="section-label">Breakdown Skor (alasan: ' + esc(ts.reason || '-') + ')</div>' +
    '<div class="scores">' + scoreRows + '</div>' +

    '<div class="section-label">Riwayat Tahap (S1&ndash;S11)</div>' +
    '<div id="stage-history-' + it.id + '">' +
      '<div class="loading-row"><span class="spinner"></span> Memuat riwayat...</div>' +
    '</div>' +

    '<textarea id="revise-note-' + it.id + '" class="revise-note" placeholder="Catatan revisi (wajib diisi)" rows="3"></textarea>' +

    '<div class="actions">' +
      '<button class="btn-approve" onclick="doAction(\'' + it.id + '\',\'approve\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>Approve</button>' +
      '<button class="btn-revise" onclick="toggleReviseNote(\'' + it.id + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4z"></path></svg>Revise</button>' +
      '<button class="btn-reject" onclick="doAction(\'' + it.id + '\',\'reject\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>Reject</button>' +
      '<button class="btn-archive" onclick="doAction(\'' + it.id + '\',\'archive\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"></polyline><rect x="1" y="3" width="22" height="5"></rect><line x1="10" y1="12" x2="14" y2="12"></line></svg>Archive</button>' +
      '<button class="btn-download" onclick="doDownload(\'' + it.id + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>Download</button>' +
    '</div>';

  loadStageHistory(it.id);
}

function toggleReviseNote(id) {
  const box = document.getElementById('revise-note-' + id);
  if (box.style.display === 'block') {
    const note = box.value.trim();
    if (!note) { showToast('Catatan revisi wajib diisi.', 'error'); return; }
    doAction(id, 'revise', note);
  } else {
    box.style.display = 'block';
    box.focus();
  }
}

const STATUS_MAP = { approve: 'approved', revise: 'revise', reject: 'rejected', archive: 'archived' };
const ACTION_LABEL = { approve: 'Disetujui', revise: 'Diminta revisi', reject: 'Ditolak', archive: 'Diarsipkan' };

async function doAction(contentItemId, action, note) {
  const { error: e1 } = await sb.schema('s7').from('review_actions').insert({ content_item_id: contentItemId, action, note: note || null });
  if (e1) { showToast('Gagal mencatat aksi: ' + e1.message, 'error'); return; }

  if (STATUS_MAP[action]) {
    const { error: e2 } = await sb.schema('s4').from('content_items').update({ status: STATUS_MAP[action] }).eq('id', contentItemId);
    if (e2) { showToast('Gagal update status: ' + e2.message, 'error'); return; }
    await sb.from('content_stage_history').insert({
      content_item_id: contentItemId, stage: 'S7', from_status: 'ready_for_review', to_status: STATUS_MAP[action], note: note || null
    });
  }
  showToast((ACTION_LABEL[action] || 'Aksi tersimpan') + '.', 'success');
  activeId = null;
  document.getElementById('detail').innerHTML = '<div id="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>Aksi tersimpan. Pilih konten lain.</div>';
  loadInbox();
}

async function loadStageHistory(contentItemId) {
  const el = document.getElementById('stage-history-' + contentItemId);
  if (!el) return;
  const { data, error } = await sb.from('content_stage_history').select('*').eq('content_item_id', contentItemId).order('occurred_at', { ascending: true });
  if (error) { el.innerHTML = '<div style="color:var(--red);font-size:12px;">Gagal memuat riwayat: ' + esc(error.message) + '</div>'; return; }
  if (!data || data.length === 0) { el.innerHTML = '<div style="color:var(--muted);font-size:12px;">Belum ada riwayat tercatat.</div>'; return; }
  el.innerHTML = data.map(h =>
    '<div class="outline-item"><span class="num">' + esc(h.stage) + '</span><span>' +
    esc(h.from_status || '(baru)') + ' &rarr; ' + esc(h.to_status) +
    ' <span style="color:var(--muted);">(' + esc(new Date(h.occurred_at).toLocaleString('id-ID')) + ')</span>' +
    (h.note ? ' &mdash; ' + esc(h.note) : '') +
    '</span></div>'
  ).join('');
}

async function doDownload(contentItemId) {
  const it = items.find(x => x.id === contentItemId);
  const draft = it && it.carousel_drafts && it.carousel_drafts[0];
  if (draft && draft.copy_url) window.open(draft.copy_url, '_blank');
  if (draft && draft.caption_url) window.open(draft.caption_url, '_blank');
  showToast('Membuka file unduhan...', 'info');
  await sb.schema('s7').from('review_actions').insert({ content_item_id: contentItemId, action: 'download' });
}

switchTab('inbox');
</script>
